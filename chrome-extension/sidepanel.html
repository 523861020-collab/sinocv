<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>SINOCV CRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;font-size:13px;color:#ccc;overflow:hidden}
.hdr{display:flex;align-items:center;padding:6px 8px;border-bottom:1px solid #1a1a1a;background:#0d0d0d}
.hdr h3{font-size:12px;color:#f59e0b;flex:1}
.hdr .r{font-size:10px;color:#666}
.tabs{display:flex;border-bottom:1px solid #1a1a1a;background:#0d0d0d}
.tabs button{flex:1;padding:6px;border:none;background:none;font-size:11px;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.tabs button.active{color:#f59e0b;border-bottom-color:#f59e0b}
.content{flex:1;overflow-y:auto;padding:8px}
input,textarea,select{width:100%;padding:6px 8px;border-radius:4px;border:1px solid #1a1a1a;background:#111;color:#fff;font-size:12px;margin-bottom:6px;outline:none}
input:focus,textarea:focus,select:focus{border-color:#f59e0b}
textarea{resize:vertical}
label{font-size:10px;color:#666;display:block;margin-bottom:2px}
.btn{width:100%;padding:8px;border-radius:6px;border:1px solid #1a1a1a;background:#111;color:#fff;font-size:12px;cursor:pointer;text-align:center;margin-bottom:4px}
.btn:hover{border-color:#f59e0b}
.btn-gold{background:#f59e0b;border-color:#f59e0b;color:#000;font-weight:700}
.btn-sm{padding:4px 8px;font-size:10px;border-radius:4px;border:1px solid #333;background:none;color:#f59e0b;cursor:pointer}
.btn-danger{border-color:#dc2626;color:#dc2626}
.row{display:flex;gap:6px}
.row>*{flex:1}
.card{border:1px solid #1a1a1a;border-radius:8px;padding:10px;margin-bottom:8px;background:#0d0d0d}
.card-title{font-size:12px;font-weight:600;color:#f59e0b;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.order-box{border:1px solid #1a1a1a;border-radius:8px;margin-bottom:6px;overflow:hidden}
.order-hdr{padding:8px 10px;background:#111;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.order-hdr:hover{background:#1a1a1a}
.order-body{padding:10px;display:none}
.order-body.open{display:block}
.follow-item{padding:6px 8px;border-bottom:1px solid #111;font-size:11px;color:#888}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:6px 14px;border-radius:4px;font-size:11px;z-index:99;max-width:90%;text-align:center}
.copy-btn{cursor:pointer;color:#f59e0b;font-size:11px;margin-left:4px}
.flex{display:flex;gap:4px;align-items:center}
.tag{padding:2px 6px;border-radius:3px;font-size:9px}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh">

<div class="hdr">
  <h3>🚛 SINOCV CRM</h3>
  <span class="r" id="statusBar">就绪</span>
</div>

<div class="tabs">
  <button class="active" data-tab="customer">📋 客户</button>
  <button data-tab="products">📦 产品</button>
  <button data-tab="templates">💬 话术</button>
</div>

<div class="content" id="content"></div>

<script src="sidepanel.js"></script>
</body>
</html>
