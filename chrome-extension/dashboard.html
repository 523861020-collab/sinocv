<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SINOCV CRM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #e5e7eb; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 260px; background: #111827; border-right: 1px solid #1f2937; overflow-y: auto; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #1f2937; }
.sidebar-header h2 { font-size: 16px; color: #f59e0b; }
.sidebar-search { padding: 10px 16px; }
.sidebar-search input { width: 100%; padding: 8px 10px; border-radius: 6px; background: #1f2937; border: 1px solid #374151; color: #e5e7eb; font-size: 13px; }
.sidebar-tabs { display: flex; padding: 0 16px; gap: 4px; margin-bottom: 8px; }
.sidebar-tab { flex: 1; padding: 6px; text-align: center; border-radius: 4px; cursor: pointer; font-size: 11px; background: #1f2937; border: none; color: #9ca3af; }
.sidebar-tab.active { background: #f59e0b; color: #000; font-weight: 600; }
.contact-list { list-style: none; }
.contact-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #1f2937; font-size: 13px; }
.contact-item:hover { background: #1f2937; }
.contact-item .name { font-weight: 600; }
.contact-item .phone { font-size: 11px; color: #6b7280; }
.contact-item .tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; margin-left: 4px; }
.tag-a { background: #7c3aed; color: #fff; }
.tag-b { background: #2563eb; color: #fff; }
.tag-c { background: #4b5563; color: #fff; }
.tag-new { background: #f59e0b; color: #000; }
.main { flex: 1; overflow-y: auto; padding: 24px; }
.placeholder { text-align: center; color: #6b7280; margin-top: 120px; font-size: 16px; }
.detail-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 24px; }
.detail-header h2 { font-size: 22px; }
.detail-header .category-select { padding: 6px 12px; border-radius: 6px; background: #1f2937; border: 1px solid #374151; color: #e5e7eb; font-size: 13px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { padding: 8px 10px; border-radius: 6px; background: #1f2937; border: 1px solid #374151; color: #e5e7eb; font-size: 13px; }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-full { grid-column: 1 / -1; }
.section-title { font-size: 15px; font-weight: 600; color: #f59e0b; margin: 20px 0 10px; padding-top: 16px; border-top: 1px solid #1f2937; }
.btn { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-primary { background: #f59e0b; color: #000; }
.btn-primary:hover { background: #d97706; }
.btn-secondary { background: #1f2937; color: #e5e7eb; border: 1px solid #374151; }
.btn-danger { background: #dc2626; color: #fff; }
.btn-sm { padding: 4px 12px; font-size: 11px; }
.actions { display: flex; gap: 8px; margin-top: 16px; }
.pi-list { margin-top: 10px; }
.pi-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: #1f2937; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
.pi-item .pi-num { font-weight: 600; color: #f59e0b; }
.pi-item .pi-date { font-size: 11px; color: #6b7280; }
.reminder-bar { background: #1f2937; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.reminder-bar .next-date { font-weight: 600; color: #f59e0b; }
.reminder-bar .countdown { font-size: 13px; color: #9ca3af; }
.stats-bar { display: flex; gap: 12px; margin-bottom: 16px; }
.stat { flex: 1; background: #111827; border: 1px solid #1f2937; border-radius: 8px; padding: 12px; text-align: center; }
.stat .num { font-size: 24px; font-weight: 700; color: #f59e0b; }
.stat .label { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.status-ok { color: #34d399; }
.status-err { color: #f87171; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header"><h2>🚛 SINOCV CRM</h2></div>
  <div class="sidebar-search"><input type="text" id="search" placeholder="Search name or phone..." oninput="renderContactList()"></div>
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" onclick="filterCategory('all',this)">All</button>
    <button class="sidebar-tab" onclick="filterCategory('A',this)">A</button>
    <button class="sidebar-tab" onclick="filterCategory('B',this)">B</button>
    <button class="sidebar-tab" onclick="filterCategory('C',this)">C</button>
    <button class="sidebar-tab" onclick="filterCategory('new',this)">New</button>
  </div>
  <ul class="contact-list" id="contactList"></ul>
</div>

<div class="main" id="main">
  <div class="placeholder">👈 Select a contact or wait for a new message</div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
